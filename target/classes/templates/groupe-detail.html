<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Groupe</title>
    <style>
        body { background-color: #dce8f5; font-family: 'Segoe UI', sans-serif; }
        .card { border: none; border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        .navbar { background: white; box-shadow: 0 1px 6px rgba(0,0,0,0.07); }
        .equipe-item { background: white; border-radius: 10px; padding: 12px 20px; margin-bottom: 8px; font-size: 1rem; color: #2c3e50; }
    </style>
</head>
<body>

    <nav class="navbar px-4 py-3">
        <a th:href="@{/groupes(userId=${userId})}" class="fw-semibold text-secondary text-decoration-none">🏆 CDM 2026</a>
        <a href="/scores" class="btn btn-sm btn-outline-secondary">Scores</a>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card p-4">
                    <h2 class="text-center mb-4 fw-light" th:text="'Groupe ' + ${groupe.lettre}"></h2>
                    <div th:each="e : ${equipe}" class="equipe-item">
                        <span th:text="${e.nom}"></span>
                    </div>
                    <a th:href="@{/prono(groupeId=${groupe.id}, userId=${userId})}"
                       class="btn btn-primary w-100 mt-3">
                        Placer mon prono
                    </a>
                </div>
            </div>
        </div>
    </div>

    <footer class="text-center text-muted mt-5 pb-3" style="font-size: 0.85rem;">
        Site codé par Imrane 💻
    </footer>

</body>
</html>
