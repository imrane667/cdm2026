<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Scores</title>
    <style>
        body { background-color: #dce8f5; font-family: 'Segoe UI', sans-serif; }
        .card { border: none; border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        .navbar { background: white; box-shadow: 0 1px 6px rgba(0,0,0,0.07); }
        .score-row { border-radius: 10px; transition: background 0.2s; }
        .score-row:hover { background-color: #f0f4f8; }
        .rank { font-size: 1.2rem; width: 40px; }
        .points-badge { background: #dce8f5; color: #2c3e50; border-radius: 20px; padding: 4px 14px; font-weight: 600; }
    </style>
</head>
<body>

    <nav class="navbar px-4 py-3">
        <a href="/" class="fw-semibold text-secondary text-decoration-none">🏆 CDM 2026</a>
        <a href="/scores" class="btn btn-sm btn-outline-secondary">Scores</a>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card p-4">
                    <h2 class="text-center mb-4 fw-light">🏆 Classement</h2>
                    <table class="table table-borderless">
                        <thead>
                            <tr class="text-muted" style="font-size: 0.85rem; text-transform: uppercase;">
                                <th>#</th>
                                <th>Joueur</th>
                                <th class="text-end">Points</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="entry, stat : ${scores}" class="score-row align-middle">
                                <td class="rank">
                                    <span th:if="${stat.index == 0}">🥇</span>
                                    <span th:if="${stat.index == 1}">🥈</span>
                                    <span th:if="${stat.index == 2}">🥉</span>
                                    <span th:if="${stat.index == 3}">4️⃣</span>
                                    <span th:if="${stat.index == 4}">5️⃣</span>
                                </td>
                                <td class="fw-semibold" th:text="${entry.key.username}"></td>
                                <td class="text-end">
                                    <span class="points-badge" th:text="${entry.value} + ' pts'"></span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <footer class="text-center text-muted mt-5 pb-3" style="font-size: 0.85rem;">
        Site codé par Imrane 💻
    </footer>

</body>
</html>
