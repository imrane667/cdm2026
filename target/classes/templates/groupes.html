<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Groupes CDM 2026</title>
    <style>
        body { background-color: #dce8f5; font-family: 'Segoe UI', sans-serif; }
        .navbar { background: white; box-shadow: 0 1px 6px rgba(0,0,0,0.07); }
        .groupe-card { border: none; border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); transition: transform 0.2s; }
        .groupe-card:hover { transform: translateY(-3px); }
        .groupe-card.done { background-color: #e8f5e9; border-left: 4px solid #4caf50; }
        .equipe-tag { background: #f0f4f8; border-radius: 8px; padding: 4px 10px; font-size: 0.85rem; color: #2c3e50; display: inline-block; margin: 2px; }
        .badge-done { background: #4caf50; color: white; border-radius: 20px; padding: 3px 10px; font-size: 0.75rem; }
    </style>
</head>
<body>

    <nav class="navbar px-4 py-3">
        <a href="/" class="fw-semibold text-secondary text-decoration-none">🏆 CDM 2026</a>
        <a href="/scores" class="btn btn-sm btn-outline-secondary">Scores</a>
    </nav>

    <div class="container mt-4 mb-5">
        <h2 class="text-center mb-4 fw-light">Les Groupes</h2>
        <div class="row g-3">
            <div th:each="groupe : ${groupes}" class="col-md-4 col-sm-6">
                <div th:classappend="${pronosPlaces[groupe.id]} ? 'done' : ''" class="groupe-card card p-3 h-100">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <h5 class="mb-0 fw-semibold" th:text="'Groupe ' + ${groupe.lettre}"></h5>
                        <span th:if="${pronosPlaces[groupe.id]}" class="badge-done">✅ Placé</span>
                    </div>
                    <div class="mb-3 text-center">
                        <span th:each="e : ${equipesParGroupe[groupe.id]}" th:text="${e.nom}" class="equipe-tag"></span>
                    </div>
                    <a th:href="@{/prono(groupeId=${groupe.id}, userId=${userId})}"
                       th:text="${pronosPlaces[groupe.id]} ? 'Modifier mon prono' : 'Placer mon prono'"
                       th:classappend="${pronosPlaces[groupe.id]} ? 'btn-outline-success' : 'btn-primary'"
                       class="btn btn-sm w-100 mt-auto">
                    </a>
                </div>
            </div>
        </div>
    </div>

    <footer class="text-center text-muted mt-5 pb-3" style="font-size: 0.85rem;">
        Site codé par Imrane 💻
    </footer>

</body>
</html>
