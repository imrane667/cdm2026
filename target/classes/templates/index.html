<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>CDM 2026 - Pronos</title>
    <style>
        body { background-color: #dce8f5; font-family: 'Segoe UI', sans-serif; }
        .card { border: none; border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        .profile-btn { background: white; border: none; border-radius: 12px; padding: 14px 20px; font-size: 1.1rem; color: #2c3e50; transition: background 0.2s; text-decoration: none; display: block; margin-bottom: 10px; text-align: center; }
        .profile-btn:hover { background: #b8d4ee; color: #2c3e50; }
        .navbar { background: white; box-shadow: 0 1px 6px rgba(0,0,0,0.07); }
    </style>
</head>
<body>

    <nav class="navbar px-4 py-3">
        <span class="fw-semibold text-secondary">🏆 CDM 2026</span>
        <a href="/scores" class="btn btn-sm btn-outline-secondary">Scores</a>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card p-4">
                    <h2 class="text-center mb-4 fw-light">Choisis ton profil</h2>
                    <a th:each="user : ${users}"
                       th:href="@{/groupes(userId=${user.id})}"
                       th:text="${user.username}"
                       class="profile-btn">
                    </a>
                </div>
            </div>
        </div>
    </div>

    <footer class="text-center text-muted mt-5 pb-3" style="font-size: 0.85rem;">
        Site codé par Imrane 💻
    </footer>

</body>
</html>
